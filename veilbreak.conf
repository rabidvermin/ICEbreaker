# veilbreak.conf — configuration for veilbreak.py
# One setting per line in KEY = VALUE format.
# All settings can be overridden with CLI flags.
# Lines beginning with # are comments and are ignored.

# Maximum number of concurrent feroxbuster jobs running at once
MAX_JOBS = 5

# Wordlist for content discovery
WORDLIST = /usr/share/seclists/Discovery/Web-Content/raft-medium-directories.txt

# Maximum directory recursion depth
DEPTH = 3

# Number of threads per feroxbuster instance
THREADS = 50

# Per-job timeout in seconds — job is killed if exceeded
JOB_TIMEOUT = 300

# HTTP status codes treated as valid responses (comma-separated)
STATUS_CODES = 200,201,204,301,302,307,401,403,405

# File extensions to enumerate (comma-separated, leave empty for none)
EXTENSIONS = php,html,js,txt,json,xml,bak,zip

# Follow redirects (yes/no)
FOLLOW_REDIRECTS = yes

# User agent string sent with each request
USER_AGENT = Mozilla/5.0 (compatible; veilbreak/1.0)

# Wildcard anomaly detection threshold (0-100)
# If this percentage of responses share the same status code
# the job is considered anomalous, killed, and reported
WILDCARD_THRESHOLD = 90

# Minimum number of responses required before wildcard check triggers
WILDCARD_MIN_SAMPLE = 20

# Scheduler poll interval in seconds
POLL_INTERVAL = 2

# Base output directory — a timestamped subfolder is created per run
OUTPUT_DIR = ./veilbreak-output

# Additional raw feroxbuster flags passed directly (space-separated)
# Example: --insecure --proxy http://127.0.0.1:8080
EXTRA_FLAGS =
