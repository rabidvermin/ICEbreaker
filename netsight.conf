# netsight.conf — default configuration for netsight.py
# One setting per line in KEY = VALUE format.
# All settings can be overridden with CLI flags.
# Lines beginning with # are comments and are ignored.

# Minimum packet rate for nmap scans (packets per second)
# Increase for fast networks, decrease for slow/noisy environments
MINRATE = 1000

# Maximum round-trip time timeout (e.g. 200ms, 500ms, 1s)
# Double the worst expected RTT in the target environment
# Increase for overseas or high-latency targets
MAXRTTTIMEOUT = 200ms

# Number of top ports to use during dark IP discovery phase
# Higher = more thorough dark IP detection, slower scan
TOPDISCOVERYPORTS = 1000

# Number of top TCP ports to enumerate on confirmed live hosts
ENUMTCPPORTS = 10000

# Number of top UDP ports to enumerate on confirmed live hosts
ENUMUDPPORTS = 10000

# Fallback top ports scan depth when a honey-pot network condition
# is detected (all hosts respond to ping or all ports appear open).
# This scan is run against all targets instead of proceeding normally.
TOPPORTSFALLBACK = 100

# Threshold percentage (0-100) of hosts responding to ping sweep
# before a honey-pot/all-responding network warning is triggered.
# Example: 95 means warn if 95% or more of targets respond to ping.
PING_RESPONSE_THRESHOLD = 80

# Threshold percentage (0-100) of ports returning open during dark
# IP top port scan before an all-ports-open warning is triggered.
OPEN_PORT_THRESHOLD = 80

# Run full 65535 port TCP scan after top port enumeration (yes/no)
# This can take a significant amount of time on large target lists
FULL_TCP_SCAN = yes

# Run full 65535 port UDP scan after top port enumeration (yes/no)
# WARNING: Full UDP scans are extremely slow. Use with caution.
FULL_UDP_SCAN = no

# Run firewall evasion scans: XMAS, FIN, MAIMON, NULL (yes/no)
EVASION_SCANS = yes

# Run source port scans to detect firewall misconfigurations (yes/no)
SOURCE_PORT_SCANS = yes

# Output directory for all scan results (relative or absolute path)
OUTPUT_DIR = .

# Input targets file
TARGETS_FILE = targets.txt

# Client exclusion file (created automatically if it does not exist)
EXCLUDE_FILE = clientexclude.txt
